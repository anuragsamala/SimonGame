<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Simon Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .auth-container:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin-bottom: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ddd;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #17b978;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #129a63;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .toggle-text span {
            color: #17b978;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.3s;
        }

        .toggle-text span:hover {
            color: #129a63;
            text-decoration: underline;
        }

        #message {
            margin-top: 15px;
            font-size: 0.9rem;
            height: 20px;
        }
        
        .error { color: #ff4d4d; }
        .success { color: #17b978; }
    </style>
</head>
<body>

    <div class="auth-container" id="auth-box">
        <h1 id="form-title">Login to Play</h1>
        <form id="auth-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn" id="submit-btn">Login</button>
        </form>
        <div id="message"></div>
        <div class="toggle-text">
            <span id="toggle-form">Need an account? Register here.</span>
        </div>
    </div>

    <script>
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleForm = document.getElementById('toggle-form');
        const authForm = document.getElementById('auth-form');
        const messageDiv = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        let isLogin = true;

        toggleForm.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                formTitle.textContent = 'Login to Play';
                submitBtn.textContent = 'Login';
                toggleForm.textContent = 'Need an account? Register here.';
            } else {
                formTitle.textContent = 'Create an Account';
                submitBtn.textContent = 'Register';
                toggleForm.textContent = 'Already have an account? Login here.';
            }
            messageDiv.textContent = '';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value;
            const password = passwordInput.value;
            
            const endpoint = isLogin ? '/login' : '/register';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = data.message;
                    messageDiv.className = 'success';
                    
                    if (isLogin) {
                        localStorage.setItem('token', data.token);
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    } else {
                        setTimeout(() => {
                            toggleForm.click(); // Switch to login after register
                        }, 1500);
                    }
                } else {
                    messageDiv.textContent = data.message || 'An error occurred';
                    messageDiv.className = 'error';
                }
            } catch (error) {
                messageDiv.textContent = 'Network error. Please try again.';
                messageDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
